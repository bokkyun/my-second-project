name: teamsync
description: "TeamSync - 공유 스케줄 관리 앱"
publish_to: 'none'
version: 1.0.14+15

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  supabase_flutter: ^2.8.4
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  table_calendar: ^3.1.2
  go_router: ^14.8.1
  flutter_colorpicker: ^1.1.0
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  shared_preferences: ^2.5.3
  google_sign_in: ^6.2.0
  home_widget: ^0.9.0
  flutter_timezone: ^5.0.2
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "icon_1024.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "icon_1024.png"

flutter:
  uses-material-design: true
