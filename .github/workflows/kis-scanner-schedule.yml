# KOSPI/KOSDAQ 일봉 매수 시그널 — 장 마감 직후(한국 15:40) + 저녁 보강(19:30)
name: KR Stock Signal Scanner

on:
  schedule:
    # 월~금 06:40 UTC ≈ 한국 15:40 (장 마감 직후)
    - cron: '40 6 * * 1-5'
    # 월~금 10:30 UTC ≈ 한국 19:30 (일봉 확정·누락 보강)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:
    inputs:
      days:
        description: '최근 N 거래일'
        required: false
        default: '10'

concurrency:
  group: kis-scanner-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/kis-test/requirements.txt

      - name: Install dependencies
        working-directory: scripts/kis-test
        run: pip install -r requirements.txt

      - name: Run KR scanner
        working-directory: scripts/kis-test
        env:
          PYTHONUNBUFFERED: '1'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: python scanner.py --days ${{ github.event.inputs.days || '10' }} --workers 8
